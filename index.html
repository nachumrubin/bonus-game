<!-- App boot loader — covers everything until Firebase auth resolves and
     the menuScreen has its first render with an authoritative isAuthed
     state. Hidden by main.js (see the wireAppLoading IIFE). Inlined here
     and styled in styles.css so it's visible at first paint, before any
     other module runs.

     Animation sequence (per 2800ms cycle, CSS-driven):
       0ms   ┃ tile ב starts falling (right-most in RTL)
       180ms ┃ tile ו starts falling
       360ms ┃ tile ס starts falling
       540ms ┃ tile ט starts falling (left-most in RTL)
       ~930ms┃ all four tiles settled
       960ms ┃ lightning bolt sweeps across the row
       ~1100ms each tile flashes brighter
       ~2400ms tiles fade upward, cycle restarts -->
<div id="app-loading" class="app-loading">
  <div class="app-loading-stage">
    <div class="app-loading-tiles" role="img" aria-label="בוסט">
      <!-- DOM order is ב,ו,ס,ט — under dir="rtl" they render visually
           right-to-left and read as the word "בוסט" -->
      <div class="app-loading-tile"><span class="t-letter">ב</span><span class="t-val">3</span></div>
      <div class="app-loading-tile"><span class="t-letter">ו</span><span class="t-val">1</span></div>
      <div class="app-loading-tile"><span class="t-letter">ס</span><span class="t-val">5</span></div>
      <div class="app-loading-tile"><span class="t-letter">ט</span><span class="t-val">4</span></div>
      <div class="app-loading-bolt" aria-hidden="true"></div>
    </div>
    <div class="app-loading-text" id="app-loading-text">מתחבר...</div>
  </div>
</div>

<!-- Global top bar — shown on all screens except the game board (#sg).
     Visibility and home-button active state are managed by screenTransitions.js. -->
<header id="global-topbar" class="em-topbar" style="display:none">
  <div class="em-topbar-icons">
    <button class="em-icon-btn" id="btn-notifications-home" onclick="openNotifications()">
      <span class="em-icon-btn-inner">🔔</span>
      <span class="em-icon-badge" id="online-badge" style="display:none"></span>
    </button>
    <button class="em-icon-btn" id="topbar-music-btn">
      <span class="em-icon-btn-inner" id="topbar-music-ic">🎵</span>
    </button>
    <button class="em-icon-btn" onclick="openSettings()">
      <span class="em-icon-btn-inner">⚙️</span>
    </button>
    <button id="topbar-help-btn" class="em-icon-btn" onclick="showTutorialIntro()">
      <span class="em-help-q">?</span>
    </button>
    <button id="topbar-home-btn" class="em-icon-btn" onclick="goHome()">
      <span class="em-icon-btn-inner">🏠</span>
    </button>
  </div>
  <button class="em-profile-btn" id="btn-profile-home" onclick="openProfileOrAuth()">
    <div class="em-avatar-wrap">
      <span id="home-avatar-ic">👤</span>
    </div>
    <div class="em-profile-info">
      <span class="em-player-name" id="home-user-label">כניסה / הרשמה</span>
      <span class="em-elo-badge" id="home-elo-label" style="display:none">
        <span class="em-elo-bolt" id="home-elo-bolt">🪙</span><span id="home-elo-value">1000</span>
      </span>
    </div>
  </button>
</header>
