<!-- AVATAR UNLOCK NOTIFICATION OVERLAY -->
<div id="ov-avatar-unlocked" class="ov hidden" onclick="if(event.target===this)ovClose('ov-avatar-unlocked')">
  <div class="ovc" style="text-align:center;max-width:280px;">
    <div class="ovh"></div>
    <div style="font-size:12px;color:rgba(255,255,255,.6);margin-bottom:6px;">🎉 אווטאר חדש נפתח!</div>
    <div id="av-unlock-ic" style="font-size:64px;line-height:1;margin:8px 0;">👑</div>
    <div id="av-unlock-name" style="font-size:18px;font-weight:900;color:#fff;margin-bottom:4px;"></div>
    <div id="av-unlock-rarity" style="font-size:12px;font-weight:700;margin-bottom:4px;"></div>
    <div id="av-unlock-cond" style="font-size:11px;color:rgba(255,255,255,.5);margin-bottom:14px;"></div>
    <div class="ovbtns">
      <button class="ovb p" onclick="ovClose('ov-avatar-unlocked');if(currentUserProfile)showAvatarGallery()">בחר אווטאר</button>
      <button class="ovb s" onclick="ovClose('ov-avatar-unlocked')">המשך</button>
    </div>
  </div>
</div>
