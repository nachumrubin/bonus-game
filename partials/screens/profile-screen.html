<!-- PROFILE SCREEN -->
<div id="sprofile" class="screen hidden">
  <div class="pf-card">

    <!-- Title with flanking lines -->
    <div class="pf-header">
      <div class="pf-header-line"></div>
      <div class="pf-header-title">הפרופיל שלי</div>
      <div class="pf-header-line"></div>
    </div>

    <!-- Avatar (tap → avatar store) -->
    <div class="pf-av-section" onclick="showAvatarStore()">
      <div class="pf-av-ring">
        <div id="profile-avatar-display"><img class="pf-avatar-img" src="assets/avatars/anonymous player.png" alt=""></div>
      </div>
      <div class="pf-av-hint">לחץ לשינוי אוואטאר</div>
    </div>

    <!-- Name -->
    <div class="pf-name-section">
      <div id="profile-name-display" class="pf-name-val" onclick="startNameEdit()"></div>
      <div class="pf-name-hint">לחץ לעריכה</div>
      <div id="profile-name-edit" class="pf-name-edit" style="display:none;">
        <input id="profile-name-input" class="ri" type="text" maxlength="15" style="text-align:center;font-size:15px;width:100%;">
        <div id="profile-name-error" style="font-size:11px;color:#ff8e8e;min-height:14px;text-align:center;margin-top:2px;"></div>
        <div style="display:flex;gap:6px;margin-top:6px;">
          <button class="bd g" style="flex:1;font-size:12px" onclick="saveDisplayName()">שמור</button>
          <button class="bd" style="flex:1;font-size:12px" onclick="cancelNameEdit()">ביטול</button>
        </div>
      </div>
    </div>

    <!-- Stats grid -->
    <div class="pf-stats">
      <div class="pf-stat-col">
        <div class="pf-sc-lbl">אחוז ניצחון</div>
        <div class="pf-sc-ic"><img src="assets/icons/statistics.png" alt=""></div>
        <div class="pf-sc-main pf-green" id="stat-winrate">0%</div>
        <div class="pf-sc-sublbl">רצף נוכחי 🔥</div>
        <div class="pf-sc-sub pf-orange" id="stat-streak">0</div>
      </div>
      <div class="pf-stat-col pf-stat-mid">
        <div class="pf-sc-lbl">נצחונות</div>
        <div class="pf-sc-ic"><img src="assets/rewards/trophy.png" alt=""></div>
        <div class="pf-sc-main pf-green" id="stat-wins">0</div>
        <div class="pf-sc-sublbl">שיא רצף</div>
        <div class="pf-sc-sub" id="stat-longeststreak">0</div>
      </div>
      <div class="pf-stat-col">
        <div class="pf-sc-lbl">משחקים</div>
        <div class="pf-sc-ic"><img src="assets/navigation/my_games.png" alt=""></div>
        <div class="pf-sc-main pf-gold" id="stat-played">0</div>
        <div class="pf-sc-sublbl">שיא אישי</div>
        <div class="pf-sc-sub pf-gold" id="stat-highscore">0</div>
      </div>
    </div>

    <!-- Email -->
    <div id="profile-email-display" class="pf-email"></div>

    <!-- Navigation buttons -->
    <div class="pf-btns">
      <button class="pf-btn pf-btn-gold" onclick="showAvatarStore()">
        <span class="pf-btn-ic"><img src="assets/ui/store.png" alt=""></span>
        <span class="pf-btn-txt">חנות אווטארים</span>
        <span class="pf-btn-chev">‹</span>
      </button>
      <button class="pf-btn pf-btn-blue" style="position:relative;" onclick="showFriendsScreen()">
        <span class="pf-btn-ic"><img src="assets/navigation/friends_nav.png" alt=""></span>
        <span class="pf-btn-txt">חברים</span>
        <span class="pf-btn-chev">‹</span>
        <span id="friends-req-badge" style="display:none;position:absolute;top:8px;left:36px;background:#f5c518;color:#000;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:900;line-height:1.4;"></span>
      </button>
      <button class="pf-btn pf-btn-dark" onclick="showStatsScreen()">
        <span class="pf-btn-ic"><img src="assets/navigation/statistics_nav.png" alt=""></span>
        <span class="pf-btn-txt">סטטיסטיקות מלאות</span>
        <span class="pf-btn-chev">‹</span>
      </button>
      <button id="btn-upgrade-account" class="pf-btn pf-btn-gold" style="display:none;" onclick="showSc('sauth-signup')">
        <span class="pf-btn-ic" style="font-size:18px;">✨</span>
        <span class="pf-btn-txt">צור חשבון — שמור את ההתקדמות</span>
        <span class="pf-btn-chev">‹</span>
      </button>
      <button class="pf-btn pf-btn-red" onclick="logoutUser()">
        <span class="pf-btn-ic"><img src="assets/ui/logout.png" alt=""></span>
        <span class="pf-btn-txt">התנתקות</span>
        <span class="pf-btn-chev">‹</span>
      </button>
    </div>

  </div>
</div>
