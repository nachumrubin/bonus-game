<!-- ONLINE: JOIN BY CODE -->
<div id="ov-join-code" class="ov hidden">
  <div class="ovc mf-ovc">
    <div class="mf-icon-hero">🔑</div>
    <div class="mf-body">
      <div class="mf-title">הצטרף למשחק</div>
      <div class="mf-desc">הזן את הקוד שקיבלת</div>

      <div id="jc-name-row" class="mf-name-row">
        <label class="mf-input-lbl">השם שלך</label>
        <input class="ri" id="jc-name" type="text" value="שחקן 2" maxlength="10">
      </div>

      <input class="mf-code-input" id="jc-code" type="tel" placeholder="000000" maxlength="6"
        oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,6)">
      <div id="jc-error" class="mf-code-error"></div>

      <button class="mf-cta" onclick="jcConfirm()">→ הצטרף</button>
      <button class="mf-cancel" onclick="ovClose('ov-join-code')">ביטול</button>
    </div>
  </div>
</div>
