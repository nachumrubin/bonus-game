<!-- Help dropdown — anchored under the top-bar `?` button.
     Opened by MENU_INTENT.OPEN_HELP_MENU, dismissed on outside click / Escape /
     item activation. Items emit MENU_INTENT.OPEN_TUTORIAL / OPEN_GUIDE / OPEN_FAQ. -->
<div id="em-help-dropdown" class="em-help-dropdown hidden" role="menu" dir="rtl" aria-label="עזרה">
  <button type="button" class="em-help-dropdown-item" data-action="tutorial" role="menuitem">
    <span class="em-help-dropdown-ic">🎓</span><span>הדרכה</span>
  </button>
  <button type="button" class="em-help-dropdown-item" data-action="guide" role="menuitem">
    <span class="em-help-dropdown-ic">📖</span><span>מדריך</span>
  </button>
  <button type="button" class="em-help-dropdown-item" data-action="faq" role="menuitem">
    <span class="em-help-dropdown-ic">❓</span><span>שאלות נפוצות</span>
  </button>
  <button type="button" class="em-help-dropdown-item" data-action="report" role="menuitem">
    <span class="em-help-dropdown-ic">🐞</span><span>דווח על בעיה במשחק</span>
  </button>
</div>
