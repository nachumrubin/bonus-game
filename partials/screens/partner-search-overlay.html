<!-- PARTNER SEARCH OVERLAY — shown while random matchmaking is active -->
<div id="ov-partner-search" class="ov hidden">
  <div class="ovc ps-ovc mf-ovc">
    <span class="ps-dice-icon">🎲</span>
    <div class="mf-body" style="align-items:center;text-align:center;">
      <div class="mf-title">מחפש יריב...</div>
      <div class="ps-dots">
        <div class="ps-dot"></div>
        <div class="ps-dot"></div>
        <div class="ps-dot"></div>
      </div>
      <div class="ps-arena">
        <!-- Player's own card -->
        <div class="ps-pcard" id="ps-me-card">
          <div class="ps-av" id="ps-my-avatar">👑</div>
          <div class="ps-nm" id="ps-my-name">שחקן</div>
          <div class="ps-lbl">את/ה</div>
        </div>
        <!-- VS divider -->
        <div class="ps-vs">VS</div>
        <!-- Slot machine card -->
        <div class="ps-pcard ps-slot-card" id="ps-slot-card">
          <div class="ps-slot-win">
            <div class="ps-slot-reel" id="ps-slot-reel"></div>
          </div>
          <div class="ps-lbl" id="ps-slot-lbl">מחפש...</div>
        </div>
      </div>
      <button class="mf-cancel" id="ps-cancel-btn" style="margin-top:8px">ביטול</button>
    </div>
  </div>
</div>
