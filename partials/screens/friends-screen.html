<!-- Friend detail overlay (position:fixed, lives outside screen div) -->
<div id="ov-friend-detail" class="ov hidden">
  <div class="ovc fd-ovc">

    <!-- Top bar: close button + overflow menu -->
    <div class="fd-topbar">
      <button id="fd-close" class="fd-topbtn" aria-label="סגור">✕</button>
      <div class="fd-topbar-spacer"></div>
      <div class="fd-overflow-wrap">
        <button id="fd-overflow-btn" class="fd-topbtn" aria-label="אפשרויות">⋮</button>
        <div id="fd-overflow-menu" class="fd-overflow-menu hidden">
          <button data-fd-remove="1" class="fd-overflow-item fd-overflow-danger">🗑 הסר חבר</button>
          <button class="fd-overflow-item fd-overflow-dim">🚫 חסום שחקן</button>
          <button class="fd-overflow-item fd-overflow-dim">⚑ דווח</button>
        </div>
      </div>
    </div>

    <!-- Hero: avatar, name, rating, between-stats badge -->
    <div class="fd-hero">
      <div class="fd-av-section">
        <div class="fd-av-ring">
          <div id="fd-avatar"><img class="av-img" src="assets/avatars/anonymous player.png" alt=""></div>
        </div>
      </div>
      <div id="fd-name" class="fd-name-text"></div>
      <div id="fd-rating" class="fd-rating-chip"></div>
      <div class="fd-between-badge">📊 סטטיסטיקה ביניכם</div>
    </div>

    <!-- Stats widget — filled by JS -->
    <div id="fd-stats" class="fd-stats-row"></div>

    <!-- Recent games card -->
    <div class="fd-card">
      <div class="fd-card-title">⏱ 5 המשחקים האחרונים</div>
      <div id="fd-recent" class="fd-recent-list"></div>
    </div>

    <!-- Active games card -->
    <div class="fd-card">
      <div class="fd-card-title">🎮 משחקים פעילים</div>
      <div id="fd-active-games"></div>
    </div>

    <!-- Primary CTA — always visible -->
    <button data-fd-invite="1" class="fd-invite-btn">✉ הזמן למשחק</button>

  </div>
</div>

<!-- FRIENDS SCREEN -->
<div id="sfriends" class="screen hidden" dir="rtl">
  <div class="fr-wrap">

    <!-- Header -->
    <div class="fr-screen-header">
      <img class="screen-hd-icon" src="assets/icons/friends.png" alt="">
      <div class="stitle">חברים</div>
    </div>

    <!-- My Code Hero Card -->
    <div class="fr-code-card">
      <div class="fr-code-label">הקוד שלי</div>
      <div id="fr-my-id" class="fr-code-number">------</div>
      <div id="fr-copy-status" class="fr-copy-status"></div>
      <button id="fr-copy-btn" class="fr-copy-btn">📋 העתק קוד</button>
    </div>

    <!-- Pending requests -->
    <div id="fr-requests-wrap" style="display:none;">
      <div class="section-title-bar">⏳ בקשות ממתינות</div>
      <div id="fr-requests-list"></div>
    </div>

    <!-- Add Friend -->
    <div class="fr-add-section glass-panel">
      <div class="fr-add-label">הוסף חבר</div>
      <div class="fr-add-row">
        <input class="ri fr-add-input" id="add-friend-input" type="text"
               placeholder="הזן קוד חבר (6 תווים)" maxlength="6"
               autocomplete="off" oninput="this.value=this.value.toUpperCase()">
        <button class="fr-add-btn" onclick="sendFriendRequest()" aria-label="הוסף חבר">
          <img class="fr-action-icon" src="assets/ui/+.png" alt="">
        </button>
      </div>
      <div id="add-friend-status" class="fr-add-status"></div>
    </div>

    <!-- Friends list -->
    <div>
      <div class="section-title-bar">👥 החברים שלי <span id="fr-friends-count">(0)</span></div>
      <div id="fr-friends-list">
        <div class="fr-empty">אין חברים עדיין</div>
      </div>
    </div>

    <!-- Invite + achievement progress card -->
    <button class="fr-invite-card" type="button" data-fr-invite-contacts="1">
      <span class="fr-invite-icon">🎁</span>
      <div class="fr-invite-body">
        <div class="fr-invite-title">הזמן חברים</div>
        <div class="fr-invite-achieve">
          <div class="fr-ia-shield">🏅</div>
          <div class="fr-ia-info">
            <div class="fr-ia-title">חבר מביא חבר</div>
            <div class="fr-ia-desc">הזמן 5 חברים לבוסט</div>
            <div class="fr-ia-bar-wrap"><div id="fr-referral-bar" class="fr-ia-bar-fill" style="width:0%"></div></div>
          </div>
          <div id="fr-referral-count" class="fr-ia-count">0/5</div>
        </div>
      </div>
      <span class="fr-invite-chev">‹</span>
    </button>
    <div id="fr-invite-status" class="fr-invite-status" aria-live="polite"></div>

    <!-- Back -->
    <button class="fr-back-btn" onclick="openProfileOrAuth()">← חזרה לפרופיל</button>

  </div>
</div>
