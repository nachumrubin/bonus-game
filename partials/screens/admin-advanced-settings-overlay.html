<!-- ADMIN ADVANCED SETTINGS OVERLAY -->
<div id="ov-dict-admin" class="ov hidden" style="z-index:200;">
  <div class="ovc" style="max-width:400px;">
    <div class="ovt" style="margin-bottom:4px">📋 הגדרות מתקדמות</div>
    <div class="ovd" style="margin-bottom:14px;">הצעות ממתינות לאישור</div>
    <!-- suggestions list -->
    <div id="dict-admin-window" style="border:1px solid #4f6f82;border-radius:10px;padding:10px;background:#143041;margin-bottom:12px;min-height:80px;">
      <div id="dict-admin-suggestions" style="max-height:240px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;"></div>
    </div>
    <div id="dict-admin-approve-btn" style="display:none"></div>
    <div id="dict-admin-reject-btn" style="display:none"></div>
    <!-- action buttons -->
    <button onclick="approveDictionaryWord()" style="width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(180deg,#5ab85a,#3a8a3a);border:2px solid #2a6a2a;color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 3px 0 #1a4a1a;margin-bottom:8px;">✅ קבל</button>
    <button onclick="rejectDictionaryWord()" style="width:100%;padding:12px;border-radius:8px;border:none;background:linear-gradient(180deg,#c85050,#8a2a2a);border:2px solid #6a1a1a;color:#fff;font-family:'Heebo',sans-serif;font-size:14px;font-weight:900;cursor:pointer;box-shadow:0 3px 0 #3a0a0a;margin-bottom:12px;">❌ דחה</button>
    <div style="display:flex;gap:8px;">
      <button id="dict-admin-logout-btn" class="ovb s hidden" style="flex:1;padding:10px;" onclick="dictionaryAdminSignOut()">התנתקות</button>
      <button class="ovb s" style="flex:1;padding:10px;" onclick="closeAdminWindow()">סגור</button>
    </div>
  </div>
</div>
