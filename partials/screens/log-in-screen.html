<!-- LOG IN SCREEN -->
<div id="sauth-login" class="screen hidden">
  <div class="sbox" style="max-width:320px;gap:10px;">
    <div class="stitle">🔐 כניסה</div>
    <div class="sf">
      <label>דוא"ל</label>
      <input id="li-email" class="ri" type="email" placeholder="your@email.com" autocomplete="email" dir="ltr">
    </div>
    <div class="sf">
      <label>סיסמה</label>
      <input id="li-pass" class="ri" type="password" placeholder="••••••••" autocomplete="current-password" dir="ltr">
    </div>
    <div id="li-error" style="min-height:16px;font-size:12px;color:#ff8e8e;text-align:center;"></div>
    <button class="bd g" id="li-submit-btn" onclick="loginUser()">כניסה</button>
    <button class="bd" id="li-forgot-btn" style="font-size:12px;background:transparent;border:none;color:#9bd0ff;text-decoration:underline;padding:2px;">שכחתי סיסמה</button>
    <div style="display:flex;gap:6px;">
      <button class="bd" style="flex:1;font-size:12px" onclick="showSc('sauth-signup')">חשבון חדש</button>
      <button class="bd" style="flex:1;font-size:12px" onclick="continueAsGuest()">כאורח</button>
    </div>
  </div>
</div>
