<!-- HOME -->
<div id="sh" class="screen hidden">
  <div class="hc em-home">

    <!-- ─ Logo ──────────────────────────────────── -->
    <div class="hlogo">
      <img src="logo_no_mascot.png" alt="בוסט">
    </div>

    <!-- ─ Resume saved game (shown only when a saved game exists) ─ -->
    <button class="bd bd-gold em-resume-btn" id="btn-resume-home" onclick="resumeSavedGame()" style="display:none">
      <span class="bd-icon">▶</span>
      <span class="bd-text"><span class="bd-title">המשך משחק שמור</span></span>
    </button>

    <!-- ─ Floating Platforms ─────────────────────── -->
    <div class="em-platforms">

      <!-- Primary circle: Online -->
      <div class="em-platform-row em-platform-row--primary">
        <button class="em-circle-btn em-circle-btn--online" id="btn-online-lobby" onclick="showOnlineLobby()">
          <div class="em-circle-icon">
            <canvas id="home-globe" class="home-globe"></canvas>
          </div>
          <div class="em-circle-text">
            <span class="em-circle-title">משחק ברשת</span>
            <span class="em-circle-sub">שחק מול שחקנים מכל הארץ</span>
          </div>
        </button>
      </div>

      <!-- Secondary circles: 2P (right) + Bot (left) -->
      <div class="em-platform-row em-platform-row--secondary">

        <!-- RIGHT: שני שחקנים -->
        <div class="em-platform-col">
          <button class="em-circle-btn" onclick="startSetup('vs')">
            <div class="em-circle-icon">
              <!-- Two upper-body silhouettes, bright traces ride directly on each edge -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 40" class="home-icon-svg">
                <defs>
                  <filter id="hm-2p-glow" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur stdDeviation="1.3" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                  <filter id="hm-2p-bright" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur stdDeviation="2.4" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                </defs>
                <!-- Back person — upper body silhouette -->
                <circle cx="28" cy="13" r="7.5" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.2"/>
                <path d="M15,38 C15,28 41,28 41,38" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
                <!-- Front person — upper body silhouette -->
                <circle cx="16" cy="16" r="8" fill="#2563eb" stroke="#bfdbfe" stroke-width="1.4" filter="url(#hm-2p-glow)"/>
                <path d="M3,40 C3,29 29,29 29,40" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="1.4" stroke-linecap="round"/>
                <!-- Back person head — bright trace (glow halo + crisp core) -->
                <circle cx="28" cy="13" r="7.5" fill="none" stroke="rgba(56,189,248,0.50)" stroke-width="3.5"
                        stroke-dasharray="28 19" filter="url(#hm-2p-glow)">
                  <animate attributeName="stroke-dashoffset" values="47;0" dur="3s" repeatCount="indefinite" calcMode="linear"/>
                </circle>
                <circle cx="28" cy="13" r="7.5" fill="none" stroke="rgba(186,230,255,0.92)" stroke-width="1.3"
                        stroke-dasharray="28 19" filter="url(#hm-2p-bright)">
                  <animate attributeName="stroke-dashoffset" values="47;0" dur="3s" repeatCount="indefinite" calcMode="linear"/>
                </circle>
                <!-- Back person body — bright trace -->
                <path d="M15,38 C15,28 41,28 41,38" fill="none" stroke="rgba(56,189,248,0.45)" stroke-width="3.5"
                      stroke-dasharray="20 15" stroke-linecap="round" filter="url(#hm-2p-glow)">
                  <animate attributeName="stroke-dashoffset" values="35;0" dur="3s" repeatCount="indefinite" calcMode="linear"/>
                </path>
                <path d="M15,38 C15,28 41,28 41,38" fill="none" stroke="rgba(186,230,255,0.88)" stroke-width="1.3"
                      stroke-dasharray="20 15" stroke-linecap="round" filter="url(#hm-2p-bright)">
                  <animate attributeName="stroke-dashoffset" values="35;0" dur="3s" repeatCount="indefinite" calcMode="linear"/>
                </path>
                <!-- Front person head — bright trace (faster, brighter) -->
                <circle cx="16" cy="16" r="8" fill="none" stroke="rgba(56,189,248,0.65)" stroke-width="4"
                        stroke-dasharray="32 18" filter="url(#hm-2p-glow)">
                  <animate attributeName="stroke-dashoffset" values="50;0" dur="2.2s" repeatCount="indefinite" calcMode="linear"/>
                </circle>
                <circle cx="16" cy="16" r="8" fill="none" stroke="rgba(224,242,254,0.98)" stroke-width="1.5"
                        stroke-dasharray="32 18" filter="url(#hm-2p-bright)">
                  <animate attributeName="stroke-dashoffset" values="50;0" dur="2.2s" repeatCount="indefinite" calcMode="linear"/>
                </circle>
                <!-- Front person body — bright trace -->
                <path d="M3,40 C3,29 29,29 29,40" fill="none" stroke="rgba(56,189,248,0.60)" stroke-width="4"
                      stroke-dasharray="22 15" stroke-linecap="round" filter="url(#hm-2p-glow)">
                  <animate attributeName="stroke-dashoffset" values="37;0" dur="2.2s" repeatCount="indefinite" calcMode="linear"/>
                </path>
                <path d="M3,40 C3,29 29,29 29,40" fill="none" stroke="rgba(224,242,254,0.95)" stroke-width="1.5"
                      stroke-dasharray="22 15" stroke-linecap="round" filter="url(#hm-2p-bright)">
                  <animate attributeName="stroke-dashoffset" values="37;0" dur="2.2s" repeatCount="indefinite" calcMode="linear"/>
                </path>
              </svg>
            </div>
            <div class="em-circle-text">
              <span class="em-circle-title">שני שחקנים</span>
              <span class="em-circle-sub">על מכשיר אחד</span>
            </div>
          </button>
        </div>

        <!-- LEFT: נגד המחשב -->
        <div class="em-platform-col">
          <button class="em-circle-btn" onclick="startSetup('bot')">
            <div class="em-circle-icon">
              <!-- Robot icon with antenna electrical pulse -->
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44" class="home-icon-svg">
                <defs>
                  <filter id="hm-bot-glow" x="-60%" y="-60%" width="220%" height="220%">
                    <feGaussianBlur stdDeviation="1.4" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                  <filter id="hm-bot-glow-strong" x="-100%" y="-100%" width="300%" height="300%">
                    <feGaussianBlur stdDeviation="2.2" result="blur"/>
                    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                  </filter>
                </defs>
                <line x1="20" y1="3" x2="20" y2="12" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
                <circle cx="20" cy="3" r="2.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
                <circle cx="20" cy="12" r="2" fill="#e0f2fe" filter="url(#hm-bot-glow-strong)">
                  <animate attributeName="cy"      values="12;3;3"     keyTimes="0;0.65;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.15 1;0 0 1 1"/>
                  <animate attributeName="r"       values="2;0.8;0"    keyTimes="0;0.65;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.15 1;0 0 1 1"/>
                  <animate attributeName="opacity" values="1;1;0"      keyTimes="0;0.65;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0 0 1 1"/>
                </circle>
                <rect x="6" y="12" width="28" height="18" rx="5" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
                <rect x="10" y="16" width="6" height="6" rx="1.5" fill="#7dd3fc" filter="url(#hm-bot-glow)"/>
                <rect x="24" y="16" width="6" height="6" rx="1.5" fill="#7dd3fc" filter="url(#hm-bot-glow)"/>
                <rect x="12" y="25" width="16" height="2.5" rx="1.25" fill="#93c5fd"/>
                <circle cx="5" cy="21" r="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
                <circle cx="35" cy="21" r="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
                <rect x="8" y="30" width="24" height="13" rx="4" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
                <rect x="13" y="33" width="14" height="5" rx="2" fill="#172554" stroke="#38bdf8" stroke-width="0.8" opacity="0.9"/>
                <circle cx="16" cy="40" r="1.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
                <circle cx="20" cy="40" r="1.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
                <circle cx="24" cy="40" r="1.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
              </svg>
            </div>
            <div class="em-circle-text">
              <span class="em-circle-title">נגד המחשב</span>
              <span class="em-circle-sub">בחר מתוך שלוש רמות קושי</span>
            </div>
          </button>
        </div>

      </div><!-- /secondary row -->

    </div><!-- /em-platforms -->

    <!-- ─ Bottom Navigation ───────────────────────── -->
    <!-- RTL flex-row: first item = RIGHT, last item = LEFT -->
    <nav id="home-bottom-nav" class="em-bottom-nav" aria-label="ניווט">

      <button class="em-nav-item" onclick="openFriends()">
        <span class="em-nav-icon">
          <!-- Friends: two upper-body silhouettes, same neon-trace style as game-mode icons -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <filter id="nav-frnd-glow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="1.3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="nav-frnd-bright" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="2.2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <!-- Back person -->
            <circle cx="21" cy="11" r="5.5" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.2"/>
            <path d="M12,30 C12,23 30,23 30,30" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
            <!-- Front person -->
            <circle cx="13" cy="13" r="6" fill="#2563eb" stroke="#bfdbfe" stroke-width="1.4" filter="url(#nav-frnd-glow)"/>
            <path d="M2,30 C2,24 24,24 24,30" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="1.4" stroke-linecap="round"/>
            <!-- Bright trace on front person head -->
            <circle cx="13" cy="13" r="6" fill="none" stroke="rgba(186,230,255,0.90)" stroke-width="1.2"
                    stroke-dasharray="26 16" filter="url(#nav-frnd-bright)">
              <animate attributeName="stroke-dashoffset" values="42;0" dur="2.2s" repeatCount="indefinite" calcMode="linear"/>
            </circle>
            <!-- Bright trace on front person body -->
            <path d="M2,30 C2,24 24,24 24,30" fill="none" stroke="rgba(186,230,255,0.85)" stroke-width="1.2"
                  stroke-dasharray="18 12" stroke-linecap="round" filter="url(#nav-frnd-bright)">
              <animate attributeName="stroke-dashoffset" values="30;0" dur="2.2s" repeatCount="indefinite" calcMode="linear"/>
            </path>
          </svg>
        </span>
        <span class="em-nav-label">חברים</span>
      </button>

      <button class="em-nav-item" onclick="showAvatarGallery()">
        <span class="em-nav-icon">
          <!-- Trophy: cup body, handles, stem, base with neon traces -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <filter id="nav-troph-glow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="1.3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="nav-troph-bright" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="2.2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <!-- Cup body -->
            <path d="M7,3 L25,3 L23,17 Q21,22 16,22 Q11,22 9,17 Z" fill="#1e40af" stroke="#60a5fa" stroke-width="1.4" stroke-linejoin="round"/>
            <!-- Left handle -->
            <path d="M8,6 Q3,6 3,11 Q3,16 8,16" fill="none" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
            <!-- Right handle -->
            <path d="M24,6 Q29,6 29,11 Q29,16 24,16" fill="none" stroke="#60a5fa" stroke-width="1.4" stroke-linecap="round"/>
            <!-- Stem -->
            <rect x="14.5" y="22" width="3" height="4" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
            <!-- Base -->
            <rect x="10" y="26" width="12" height="3" rx="1.5" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.2"/>
            <!-- Center star glow -->
            <circle cx="16" cy="12" r="2.2" fill="#38bdf8" filter="url(#nav-troph-glow)"/>
            <circle cx="16" cy="12" r="1" fill="#e0f2fe" filter="url(#nav-troph-bright)"/>
            <!-- Bright trace around cup outline -->
            <path d="M7,3 L25,3 L23,17 Q21,22 16,22 Q11,22 9,17 Z"
                  fill="none" stroke="rgba(186,230,255,0.88)" stroke-width="1"
                  stroke-dasharray="34 22" filter="url(#nav-troph-bright)">
              <animate attributeName="stroke-dashoffset" values="56;0" dur="2.6s" repeatCount="indefinite" calcMode="linear"/>
            </path>
          </svg>
        </span>
        <span class="em-nav-label">הישגים</span>
      </button>

      <button class="em-nav-item" onclick="openStats()">
        <span class="em-nav-icon">
          <!-- Bar chart: 3 bars of varying height with glowing tops -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-hidden="true">
            <defs>
              <filter id="nav-stats-glow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="1.3" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
              <filter id="nav-stats-bright" x="-100%" y="-100%" width="300%" height="300%">
                <feGaussianBlur stdDeviation="2.2" result="blur"/>
                <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <!-- Baseline -->
            <line x1="2" y1="29" x2="30" y2="29" stroke="#60a5fa" stroke-width="1.2" stroke-linecap="round"/>
            <!-- Bar 1 (left, medium) -->
            <rect x="2" y="15" width="7" height="14" rx="1" fill="#1e40af" stroke="#60a5fa" stroke-width="1.2"/>
            <!-- Bar 2 (middle, tallest) -->
            <rect x="12.5" y="8" width="7" height="21" rx="1" fill="#2563eb" stroke="#60a5fa" stroke-width="1.2"/>
            <!-- Bar 3 (right, short) -->
            <rect x="23" y="21" width="7" height="8" rx="1" fill="#1e40af" stroke="#60a5fa" stroke-width="1.2"/>
            <!-- Glowing top edges -->
            <line x1="2" y1="15" x2="9" y2="15" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" filter="url(#nav-stats-glow)"/>
            <line x1="12.5" y1="8" x2="19.5" y2="8" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" filter="url(#nav-stats-glow)"/>
            <line x1="23" y1="21" x2="30" y2="21" stroke="#38bdf8" stroke-width="1.8" stroke-linecap="round" filter="url(#nav-stats-glow)"/>
            <!-- Bright highlight on tops -->
            <line x1="2" y1="15" x2="9" y2="15" stroke="rgba(186,230,255,0.90)" stroke-width="1" filter="url(#nav-stats-bright)"/>
            <line x1="12.5" y1="8" x2="19.5" y2="8" stroke="rgba(186,230,255,0.90)" stroke-width="1" filter="url(#nav-stats-bright)"/>
            <line x1="23" y1="21" x2="30" y2="21" stroke="rgba(186,230,255,0.90)" stroke-width="1" filter="url(#nav-stats-bright)"/>
          </svg>
        </span>
        <span class="em-nav-label">סטטיסטיקות</span>
      </button>

    </nav>
