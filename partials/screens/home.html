<!-- HOME -->
<div id="sh" class="screen hidden">
  <div class="hc em-home">

    <!-- ─ Logo ──────────────────────────────────── -->
    <div class="hlogo">
      <img src="logo_no_mascot.png" alt="בוסט">
    </div>

    <!-- ─ Game Mode Cards ────────────────────────── -->
    <div class="hm-cards">

      <!-- Online -->
      <button class="hm-card hm-card--online" id="btn-online-lobby" onclick="showOnlineLobby()">
        <div class="hm-card-icon">
          <img src="assets/icons/globe.png" alt="">
        </div>
        <div class="hm-card-body">
          <span class="hm-card-title">משחק ברשת</span>
          <span class="hm-card-sub">שחק מול שחקנים אמיתיים ברחבי העולם</span>
        </div>
        <div class="hm-card-chev">❯</div>
      </button>

      <!-- Bot -->
      <button class="hm-card hm-card--bot" onclick="startSetup('bot')">
        <div class="hm-card-icon">
          <img src="assets/avatars/bot.png" alt="">
        </div>
        <div class="hm-card-body">
          <span class="hm-card-title">נגד המחשב</span>
          <span class="hm-card-sub">התאמן מול הבוט ושפר את יכולתך</span>
        </div>
        <div class="hm-card-chev">❯</div>
      </button>

      <!-- 2P -->
      <button class="hm-card hm-card--2p" onclick="startSetup('vs')">
        <div class="hm-card-icon">
          <img src="assets/icons/1v1.png" alt="">
        </div>
        <div class="hm-card-body">
          <span class="hm-card-title">שני שחקנים</span>
          <span class="hm-card-sub">שחק עם חבר על אותו מכשיר</span>
        </div>
        <div class="hm-card-chev">❯</div>
      </button>

    </div><!-- /hm-cards -->

    <!-- ─ Bottom Navigation ───────────────────────── -->
    <!-- RTL flex-row: first item = RIGHT, last item = LEFT -->
    <nav id="home-bottom-nav" class="em-bottom-nav" aria-label="ניווט">

      <button class="em-nav-item em-nav-item--mygames" onclick="openMyGames()">
        <img class="em-nav-icon em-nav-icon-img" src="assets/navigation/my_games.png" alt="">
        <span class="em-nav-badge" id="mg-nav-badge" style="display:none" aria-live="polite"></span>
        <span class="em-nav-label">המשחקים שלי</span>
      </button>

      <button class="em-nav-item" onclick="openFriends()">
        <img class="em-nav-icon em-nav-icon-img" src="assets/icons/friends.png" alt="">
        <span class="em-nav-label">חברים</span>
      </button>

      <button class="em-nav-item" onclick="showAvatarGallery()">
        <img class="em-nav-icon em-nav-icon-img" src="assets/icons/acheivments.png" alt="">
        <span class="em-nav-label">הישגים</span>
      </button>

      <button class="em-nav-item" onclick="openStats()">
        <img class="em-nav-icon em-nav-icon-img" src="assets/icons/statistics.png" alt="">
        <span class="em-nav-label">סטטיסטיקות</span>
      </button>

    </nav>

    <!-- Credit -->
    <div class="credit">
      <a href="privacy-policy.html" target="_blank">מדיניות פרטיות</a> · v2.1 · build 20260624075823
      <br>
      <span dir="ltr">Music: "Inspire Action" by <a href="https://freemusicarchive.org/music/ura-megis/" target="_blank" rel="noopener">Yuri Megis</a> · <a href="https://freemusicarchive.org/music/ura-megis/single/inspire-action-1/" target="_blank" rel="noopener">Free Music Archive</a> · <a href="https://creativecommons.org/licenses/by/4.0/" target="_blank" rel="noopener">CC BY 4.0</a></span>
    </div>

  </div>
</div>
