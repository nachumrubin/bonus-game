<!-- HOME -->
<div id="sh" class="screen hidden">
  <div class="hc em-home">

    <!-- ─ Top Bar ─────────────────────────────────── -->
    <header class="em-topbar">
      <!-- RIGHT side: icon buttons (first in RTL flex = rightmost) -->
      <div class="em-topbar-icons">
        <button class="em-icon-btn" id="btn-notifications-home" onclick="openNotifications()">
          <span class="em-icon-btn-inner">🔔</span>
          <span class="em-icon-badge" id="online-badge" style="display:none"></span>
        </button>
        <button class="em-icon-btn" onclick="openSettings()">
          <span class="em-icon-btn-inner">⚙️</span>
        </button>
        <button class="em-icon-btn" onclick="showTutorialIntro()">
          <span class="em-help-q">?</span>
        </button>
      </div>
      <!-- LEFT side: profile (last in RTL flex = leftmost) -->
      <button class="em-profile-btn" id="btn-profile-home" onclick="openProfileOrAuth()">
        <div class="em-avatar-wrap">
          <span id="home-avatar-ic">👤</span>
        </div>
        <div class="em-profile-info">
          <span class="em-player-name" id="home-user-label">כניסה / הרשמה</span>
          <span class="em-elo-badge" id="home-elo-label" style="display:none">
            <span class="em-elo-bolt">⚡</span>ELO <span id="home-elo-value">1000</span>
          </span>
        </div>
      </button>
    </header>

    <!-- ─ Logo ──────────────────────────────────── -->
    <div class="hlogo">
      <img src="logo_no_mascot.png" alt="בוסט">
    </div>

    <!-- ─ Resume saved game (shown only when a saved game exists) ─ -->
    <button class="bd bd-gold em-resume-btn" id="btn-resume-home" onclick="resumeSavedGame()" style="display:none">
      <span class="bd-icon">▶</span>
      <span class="bd-text"><span class="bd-title">המשך משחק שמור</span></span>
    </button>

    <!-- ─ Floating Platforms ─────────────────────── -->
    <div class="em-platforms">

      <!-- Energy network linking platforms — zigzag lightning, double-path glow technique -->
      <svg class="em-lightning-bg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 240" preserveAspectRatio="xMidYMid meet">
        <defs>
          <filter id="em-glow">
            <feGaussianBlur stdDeviation="4.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
          <filter id="em-glow-sm">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- Central bolt: zigzag — halo -->
        <path class="em-lightning-main" d="M160 6 L153 42 L170 55 L155 82 L167 95 L148 118 L142 128" stroke="rgba(0,178,255,0.20)" stroke-width="11" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow)"/>
        <!-- Central bolt: bright core -->
        <path class="em-lightning-main" d="M160 6 L153 42 L170 55 L155 82 L167 95 L148 118 L142 128" stroke="rgba(0,228,255,0.90)" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow-sm)"/>

        <!-- Left branch A: zigzag strand 1 — halo -->
        <path class="em-lightning-branch" d="M142 128 L124 142 L110 156 L95 146 L80 160 L70 162" stroke="rgba(0,158,255,0.16)" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow)"/>
        <!-- Left branch A: bright core -->
        <path class="em-lightning-branch" d="M142 128 L124 142 L110 156 L95 146 L80 160 L70 162" stroke="rgba(0,208,255,0.72)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow-sm)"/>
        <!-- Left branch B: zigzag strand 2 (offset kinks for layered effect) — halo -->
        <path class="em-lightning-branch" d="M142 128 L128 138 L114 152 L100 143 L84 157 L70 162" stroke="rgba(0,140,255,0.10)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow)"/>
        <!-- Left branch B: bright core -->
        <path class="em-lightning-branch" d="M142 128 L128 138 L114 152 L100 143 L84 157 L70 162" stroke="rgba(0,200,255,0.45)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow-sm)"/>

        <!-- Right branch A: zigzag strand 1 — halo -->
        <path class="em-lightning-branch" d="M142 128 L160 142 L174 156 L189 146 L204 160 L214 162" stroke="rgba(0,158,255,0.16)" stroke-width="9" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow)"/>
        <!-- Right branch A: bright core -->
        <path class="em-lightning-branch" d="M142 128 L160 142 L174 156 L189 146 L204 160 L214 162" stroke="rgba(0,208,255,0.72)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow-sm)"/>
        <!-- Right branch B: zigzag strand 2 (offset kinks) — halo -->
        <path class="em-lightning-branch" d="M142 128 L156 138 L170 152 L184 143 L200 157 L214 162" stroke="rgba(0,140,255,0.10)" stroke-width="7" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow)"/>
        <!-- Right branch B: bright core -->
        <path class="em-lightning-branch" d="M142 128 L156 138 L170 152 L184 143 L200 157 L214 162" stroke="rgba(0,200,255,0.45)" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round" filter="url(#em-glow-sm)"/>

        <!-- Junction node -->
        <circle class="em-lightning-main" cx="142" cy="128" r="5.5" fill="rgba(0,228,255,0.74)" filter="url(#em-glow)"/>
      </svg>

      <!-- Primary platform: Online -->
      <div class="em-platform-row em-platform-row--primary">
        <div class="em-float-icon em-float-icon--online" aria-hidden="true">
          <canvas id="home-globe" class="home-globe"></canvas>
        </div>
        <button class="em-platform em-platform--primary" id="btn-online-lobby" onclick="showOnlineLobby()">
          <div class="em-platform-content">
            <!-- text is first in RTL flex = rightmost -->
            <div class="em-platform-text">
              <span class="em-platform-title">משחק אונליין</span>
              <span class="em-platform-sub">שחק מול שחקנים מכל העולם</span>
            </div>
            <!-- arrow is last in RTL flex = leftmost -->
            <span class="em-platform-arrow" aria-hidden="true">›</span>
          </div>
        </button>
      </div>

      <!-- Secondary platforms: 2P (right) + Bot (left) -->
      <!-- In RTL flex-row: first child appears on RIGHT, second on LEFT -->
      <div class="em-platform-row em-platform-row--secondary">

        <!-- RIGHT: שני שחקנים -->
        <div class="em-platform-col">
          <div class="em-float-icon em-float-icon--2p" aria-hidden="true">
            <!-- Two players icon -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 40" class="home-icon-svg">
              <defs>
                <filter id="hm-2p-glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="1.2" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              <!-- Back person -->
              <circle cx="28" cy="13" r="7.5" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5"/>
              <path d="M15 38 C15 28 41 28 41 38" fill="#1e3a8a" stroke="#60a5fa" stroke-width="1.5" stroke-linecap="round" fill-opacity="0.9"/>
              <!-- Front person -->
              <circle cx="16" cy="16" r="8" fill="#2563eb" stroke="#bfdbfe" stroke-width="1.5" filter="url(#hm-2p-glow)"/>
              <path d="M3 40 C3 29 29 29 29 40" fill="#1d4ed8" stroke="#bfdbfe" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </div>
          <button class="em-platform em-platform--secondary" onclick="startSetup('vs')">
            <div class="em-platform-content">
              <div class="em-platform-text">
                <span class="em-platform-title">שני שחקנים</span>
                <span class="em-platform-sub">שחק עם חבר</span>
              </div>
              <span class="em-platform-arrow" aria-hidden="true">›</span>
            </div>
          </button>
        </div>

        <!-- LEFT: נגד המחשב -->
        <div class="em-platform-col">
          <div class="em-float-icon em-float-icon--bot" aria-hidden="true">
            <!-- Robot icon with antenna electrical pulse -->
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 44" class="home-icon-svg">
              <defs>
                <filter id="hm-bot-glow" x="-60%" y="-60%" width="220%" height="220%">
                  <feGaussianBlur stdDeviation="1.4" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
                <filter id="hm-bot-glow-strong" x="-100%" y="-100%" width="300%" height="300%">
                  <feGaussianBlur stdDeviation="2.2" result="blur"/>
                  <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>
              <!-- Antenna post -->
              <line x1="20" y1="3" x2="20" y2="12" stroke="#60a5fa" stroke-width="1.8" stroke-linecap="round" opacity="0.85"/>
              <!-- Antenna tip -->
              <circle cx="20" cy="3" r="2.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
              <!-- Electrical pulse — travels from base (cy=12) to tip (cy=3) -->
              <circle cx="20" cy="12" r="2" fill="#e0f2fe" filter="url(#hm-bot-glow-strong)">
                <animate attributeName="cy"      values="12;3;3"     keyTimes="0;0.65;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.15 1;0 0 1 1"/>
                <animate attributeName="r"       values="2;0.8;0"    keyTimes="0;0.65;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0.3 0 0.15 1;0 0 1 1"/>
                <animate attributeName="opacity" values="1;1;0"      keyTimes="0;0.65;1" dur="1.8s" repeatCount="indefinite" calcMode="spline" keySplines="0 0 1 1;0 0 1 1"/>
              </circle>
              <!-- Head -->
              <rect x="6" y="12" width="28" height="18" rx="5" fill="#1e40af" stroke="#60a5fa" stroke-width="1.5"/>
              <!-- Eyes -->
              <rect x="10" y="16" width="6" height="6" rx="1.5" fill="#7dd3fc" filter="url(#hm-bot-glow)"/>
              <rect x="24" y="16" width="6" height="6" rx="1.5" fill="#7dd3fc" filter="url(#hm-bot-glow)"/>
              <!-- Mouth -->
              <rect x="12" y="25" width="16" height="2.5" rx="1.25" fill="#93c5fd"/>
              <!-- Ear bolts -->
              <circle cx="5" cy="21" r="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
              <circle cx="35" cy="21" r="3" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1"/>
              <!-- Body -->
              <rect x="8" y="30" width="24" height="13" rx="4" fill="#1d4ed8" stroke="#60a5fa" stroke-width="1.5"/>
              <!-- Body centre panel -->
              <rect x="13" y="33" width="14" height="5" rx="2" fill="#172554" stroke="#38bdf8" stroke-width="0.8" opacity="0.9"/>
              <!-- Indicator lights -->
              <circle cx="16" cy="40" r="1.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
              <circle cx="20" cy="40" r="1.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
              <circle cx="24" cy="40" r="1.5" fill="#38bdf8" filter="url(#hm-bot-glow)"/>
            </svg>
          </div>
          <button class="em-platform em-platform--secondary" onclick="startSetup('bot')">
            <div class="em-platform-content">
              <div class="em-platform-text">
                <span class="em-platform-title">נגד המחשב</span>
                <span class="em-platform-sub">התמודד נגד הבינה המלאכותית</span>
              </div>
              <span class="em-platform-arrow" aria-hidden="true">›</span>
            </div>
          </button>
        </div>

      </div><!-- /secondary row -->

    </div><!-- /em-platforms -->

    <!-- ─ Bottom Navigation ───────────────────────── -->
    <!-- RTL flex-row: first item = RIGHT, last item = LEFT -->
    <nav class="em-bottom-nav" aria-label="ניווט">

      <!-- RIGHT: שתף (shown only when authenticated) -->
      <button class="em-nav-item" id="btn-share-game" onclick="shareGame()" style="display:none">
        <span class="em-nav-icon">📤</span>
        <span class="em-nav-label">שתף</span>
      </button>

      <button class="em-nav-item" onclick="openFriends()">
        <span class="em-nav-icon">👫</span>
        <span class="em-nav-label">חברים</span>
      </button>

      <button class="em-nav-item" onclick="openChampions()">
        <span class="em-nav-icon">🏆</span>
        <span class="em-nav-label">הישגים</span>
      </button>

      <button class="em-nav-item" onclick="openStats()">
        <span class="em-nav-icon">📊</span>
        <span class="em-nav-label">סטטיסטיקות</span>
      </button>

      <!-- LEFT: בית (active) -->
      <button class="em-nav-item em-nav-item--active" aria-current="page">
        <span class="em-nav-icon">⚡</span>
        <span class="em-nav-label">בית</span>
      </button>

    </nav>

    <!-- Credit -->
    <div class="credit">

    </div>

  </div>
</div>
