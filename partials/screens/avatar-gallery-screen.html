<!-- AVATAR GALLERY SCREEN -->
<div id="sav-gallery" class="screen hidden">
  <div style="width:100%;max-width:360px;display:flex;flex-direction:column;height:100%;padding:16px 12px;box-sizing:border-box;">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;">
      <button class="bd" style="width:auto;padding:8px 14px;font-size:13px;flex-shrink:0;" onclick="showProfileScreen()">←</button>
      <div style="font-size:17px;font-weight:900;color:var(--by,#f5c518);flex:1;text-align:center;">🎨 אוסף האווטארים</div>
    </div>
    <div id="av-gallery-count" style="text-align:center;font-size:11px;color:rgba(255,255,255,.45);margin-bottom:10px;"></div>
    <div id="av-locked-hint" style="text-align:center;font-size:12px;color:rgba(255,255,255,.7);background:rgba(0,0,0,.35);border-radius:6px;padding:6px 10px;margin-bottom:8px;min-height:28px;transition:opacity .4s;opacity:0;"></div>
    <div id="av-gallery-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;overflow-y:auto;flex:1;padding-bottom:8px;"></div>
  </div>
</div>
