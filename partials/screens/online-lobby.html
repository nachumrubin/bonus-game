<!-- ONLINE LOBBY -->
<div id="so" class="screen hidden">
  <div class="online-wrap">
    <div class="online-title">
      <span class="globe3d" aria-hidden="true">
        <span class="globe3d-scene">
          <span class="globe3d-spin">
            <span class="globe3d-m"></span>
            <span class="globe3d-m" style="--r:36deg"></span>
            <span class="globe3d-m" style="--r:72deg"></span>
            <span class="globe3d-m" style="--r:108deg"></span>
            <span class="globe3d-m" style="--r:144deg"></span>
          </span>
          <span class="globe3d-lat" style="--t:20%"></span>
          <span class="globe3d-lat" style="--t:44%"></span>
          <span class="globe3d-lat" style="--t:68%"></span>
          <span class="globe3d-shine"></span>
        </span>
      </span>
      משחק אונליין
    </div>
    <div class="online-subtitle">בחר כיצד תרצה לשחק</div>
    <div id="online-sessions-wrap" style="display:none;width:100%;margin-bottom:8px;"></div>
    <div style="width:100%">
      <button class="omode-btn" onclick="onlineCreateRoom()">
        <span class="omode-ic">🏠</span>
        <span><span class="omode-label">פתח משחק חדש</span><span class="omode-desc">בחר הגדרות ושלח קוד לחבר</span></span>
      </button>
      <button class="omode-btn" onclick="onlineJoinByCode()">
        <span class="omode-ic">🔑</span>
        <span><span class="omode-label">הצטרף לפי קוד</span><span class="omode-desc">הזן קוד שקיבלת מחבר</span></span>
      </button>
      <button class="omode-btn" onclick="onlineMatchmaking()">
        <span class="omode-ic">🎲</span>
        <span><span class="omode-label">חפש יריב אקראי</span><span class="omode-desc">התחבר לשחקן זמין</span></span>
      </button>
    </div>
    <button class="bd" style="width:100%;font-size:12px" onclick="goHome()">← חזרה</button>
  </div>
</div>
