<!-- SIGN UP SCREEN -->
<div id="sauth-signup" class="screen hidden">
  <div class="sbox" style="max-width:320px;gap:10px;">
    <div class="stitle">✨ יצירת חשבון</div>
    <div class="sf">
      <label>שם תצוגה (עד 15 תווים)</label>
      <input id="su-name" class="ri" type="text" maxlength="15" placeholder="השם שיופיע במשחק" autocomplete="username">
    </div>
    <div class="sf">
      <label>דוא"ל</label>
      <input id="su-email" class="ri" type="email" placeholder="your@email.com" autocomplete="email" dir="ltr">
    </div>
    <div class="sf">
      <label>סיסמה (8+ תווים, אות וספרה)</label>
      <div class="pw-wrap">
        <input id="su-pass" class="ri pw-input" type="password" placeholder="••••••••" autocomplete="new-password" dir="ltr">
        <button type="button" class="pw-toggle" data-pw-target="su-pass" aria-label="הצג סיסמה">👁</button>
      </div>
    </div>
    <div class="sf">
      <label>אימות סיסמה</label>
      <div class="pw-wrap">
        <input id="su-pass-confirm" class="ri pw-input" type="password" placeholder="••••••••" autocomplete="new-password" dir="ltr">
        <button type="button" class="pw-toggle" data-pw-target="su-pass-confirm" aria-label="הצג סיסמה">👁</button>
      </div>
    </div>
    <label class="su-checkbox-row">
      <input id="su-notify" type="checkbox" checked>
      <span>אני רוצה לקבל התראות (משחקים, הזמנות, תזכורות)</span>
    </label>
    <div id="su-error" style="min-height:16px;font-size:12px;color:#ff8e8e;text-align:center;"></div>
    <button class="bd g" id="su-submit-btn" onclick="signUpUser()">צור חשבון</button>
    <div style="display:flex;gap:6px;">
      <button class="bd" style="flex:1;font-size:12px" onclick="showSc('sauth-login')">יש לי חשבון</button>
      <button class="bd" style="flex:1;font-size:12px" onclick="continueAsGuest()">המשך כאורח</button>
    </div>
  </div>
</div>
