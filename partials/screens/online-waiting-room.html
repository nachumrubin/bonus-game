<!-- ONLINE: WAITING ROOM -->
<div id="ov-waiting-room" class="ov hidden">
  <div class="ovc wr-ovc">

    <!-- Hero hourglass -->
    <div class="wr-hero">
      <div class="wr-icon-ring">⏳</div>
    </div>

    <!-- Title + subtitle -->
    <div class="wr-title" id="wr-title">ממתין לשחקן שני...</div>
    <div class="wr-subtitle">שתף את הקוד עם חבר</div>

    <!-- Code -->
    <div id="wr-code-section" class="wr-code-section">
      <div class="wr-code-display" id="wr-code">------</div>
    </div>

    <!-- Mode badge (e.g. ⚡ משחק לייב) -->
    <div class="wr-mode-badge" id="wr-mode-label"></div>

    <!-- Countdown — shown only while live invite is pending -->
    <div id="wr-countdown" style="display:none" class="wr-countdown"></div>

    <!-- Primary actions -->
    <div id="wr-action-btns" class="wr-action-row">
      <button id="wr-cancel-btn" class="wr-btn-cancel" onclick="crCancelRoom()">
        <span class="wr-btn-icon">🛡</span> ביטול
      </button>
      <button id="wr-share-btn" class="wr-btn-share" onclick="crShareWhatsApp()">
        <span class="wr-wa-icon"></span>
        שתף ב-WhatsApp
      </button>
    </div>

    <!-- Invite by username -->
    <div id="wr-invite-section" class="wr-invite-section">
      <div class="wr-invite-title">הזמן שחקן לפי שם משתמש</div>
      <div class="wr-invite-row">
        <div class="wr-invite-input-wrap">
          <input class="ri wr-invite-input" id="wr-invite-name" type="text"
            placeholder="חפש חבר..." maxlength="15"
            oninput="filterInviteList(this.value)"
            onfocus="filterInviteList(this.value)"
            autocomplete="off">
          <div id="wr-invite-dropdown" style="display:none;position:absolute;top:100%;left:0;right:0;background:rgba(6,19,61,.98);border:1px solid rgba(255,255,255,.2);border-radius:8px;max-height:140px;overflow-y:auto;z-index:200;margin-top:3px;"></div>
        </div>
        <button class="wr-send-btn" onclick="crSendInvite()">שלח הזמנה</button>
      </div>
      <div id="wr-invite-status" class="wr-invite-status"></div>
    </div>

    <!-- Footer restriction notice -->
    <div class="wr-footer-notice">
      🛡 רק שחקנים ברשימת החברים שלך יכולים להצטרף
    </div>

  </div>
</div>
