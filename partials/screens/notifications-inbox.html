<!-- NOTIFICATIONS INBOX -->
<div id="snotif" class="screen hidden">
  <div class="nf-shell">

    <!-- Screen header -->
    <header class="nf-header">
      <img class="nf-header-icon" src="assets/navigation/bell.png" alt="">
      <h1 class="nf-title">הזמנות</h1>
      <div class="nf-divider" aria-hidden="true"></div>
    </header>

    <!-- Empty state -->
    <div id="notif-empty" class="nf-empty-card">
      <div class="nf-empty-title">אין הזמנות חדשות</div>
      <div class="nf-empty-check">אתם מעודכנים ✔</div>
    </div>

    <!-- Game invites -->
    <div id="notif-invites-wrap" class="nf-section" style="display:none;">
      <div class="nf-section-hdr">🎮 הזמנות למשחק</div>
      <div id="notif-invites-list" class="nf-list"></div>
    </div>

    <!-- Friend requests -->
    <div id="notif-friends-wrap" class="nf-section" style="display:none;">
      <div class="nf-section-hdr">👥 בקשות חברות</div>
      <div id="notif-friends-list" class="nf-list"></div>
    </div>

    <!-- Support replies -->
    <div id="notif-support-wrap" class="nf-section" style="display:none;">
      <div class="nf-section-hdr">עדכוני פניות</div>
      <div id="notif-support-list" class="nf-list"></div>
    </div>

  </div>
</div>
