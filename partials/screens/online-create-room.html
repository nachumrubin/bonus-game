<!-- ONLINE: CREATE ROOM -->
<div id="ov-create-room" class="ov hidden">
  <div class="ovc mf-ovc">
    <div class="mf-icon-hero">🏠</div>
    <div class="mf-body">
      <div class="mf-title">פתיחת משחק חדש</div>
      <div class="mf-desc" data-gm="בחר הגדרות ושלח את הקוד לחבר" data-gf="בחרי הגדרות ושלחי קוד לחבר">בחר הגדרות ושלח את הקוד לחבר</div>

      <div id="cr-name-row" class="mf-name-row">
        <label class="mf-input-lbl">השם שלך</label>
        <input class="ri" id="cr-name" type="text" placeholder="השם שלך" maxlength="10">
      </div>

      <div class="mf-section-lbl">סוג משחק</div>
      <div class="mf-opt-row">
        <button id="cr-mode-live" class="mf-opt-card active" onclick="crSetMode('live')">
          <span class="mf-opt-icon">⚡</span>
          <span class="mf-opt-label">לייב</span>
          <span class="mf-opt-sub">זמן אמת</span>
        </button>
        <button id="cr-mode-async" class="mf-opt-card" onclick="crSetMode('async')">
          <span class="mf-opt-icon">📬</span>
          <span class="mf-opt-label">אסינכרוני</span>
          <span class="mf-opt-sub">לא בזמן אמת</span>
        </button>
      </div>

      <div id="cr-speed-row">
        <div class="mf-section-lbl">קצב משחק</div>
        <div class="mf-opt-row">
          <button id="cr-spd-20" class="mf-opt-card">
            <span class="mf-opt-icon">⚡</span>
            <span class="mf-opt-label">בזק</span>
            <span class="mf-opt-sub">20 שניות</span>
          </button>
          <button id="cr-spd-40" class="mf-opt-card active">
            <span class="mf-opt-icon">🎯</span>
            <span class="mf-opt-label">רגיל</span>
            <span class="mf-opt-sub">40 שניות</span>
          </button>
          <button id="cr-spd-60" class="mf-opt-card">
            <span class="mf-opt-icon">🐢</span>
            <span class="mf-opt-label">איטי</span>
            <span class="mf-opt-sub">60 שניות</span>
          </button>
        </div>
      </div>

      <button class="mf-cta green" onclick="crConfirm()">▶ פתח משחק</button>
      <button class="mf-cancel" onclick="ovClose('ov-create-room')">ביטול</button>
    </div>
  </div>
</div>
