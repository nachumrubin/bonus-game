<!-- BACK BUTTON CONFIRM OVERLAY — same design as pause dialog -->
<div id="ov-back-confirm" class="ov hidden">
  <div class="ovc pause-ovc">

    <!-- (Close X removed — the "חזור למשחק" action already returns to the game.) -->

    <!-- Hourglass hero -->
    <div class="pause-hero" aria-hidden="true">
      <div class="pause-hg-ring"></div>
      <img class="pause-hg" src="assets/ui/hourglass.png" alt="">
    </div>

    <!-- Title -->
    <div class="pause-title">סיום המשחק</div>
    <div class="pause-sub">מה תרצה לעשות?</div>

    <!-- Action buttons -->
    <div class="pause-actions">

      <!-- 1. Stay (primary) -->
      <button class="pause-action pause-action--primary" onclick="backConfirmStay()">
        <div class="pause-action-icon">
          <img src="assets/ui/play.png" alt="" class="ui-icon">
        </div>
        <div class="pause-action-body">
          <span class="pause-action-label" data-gm="חזור למשחק" data-gf="חזרי למשחק">חזור למשחק</span>
          <span class="pause-action-sub" data-gm="המשך לשחק עכשיו" data-gf="המשיכי לשחק עכשיו">המשך לשחק עכשיו</span>
        </div>
      </button>

      <!-- 2. Pause & save (recommended) -->
      <button class="pause-action pause-action--save" onclick="pauseGame();backConfirmStay()">
        <div class="pause-action-icon pause-action-icon--save">
          <img src="assets/ui/pause.png" alt="" class="ui-icon">
        </div>
        <div class="pause-action-body">
          <span class="pause-action-label">השהה ושמור</span>
          <span class="pause-action-sub">חזור למשחק מאוחר יותר</span>
        </div>
        <div class="pause-action-badge">★ מומלץ</div>
      </button>

      <!-- 3. Leave without saving (destructive) -->
      <button class="pause-action pause-action--quit" onclick="backConfirmLeave()">
        <div class="pause-action-icon pause-action-icon--quit">
          <img src="assets/ui/logout.png" alt="" class="ui-icon">
        </div>
        <div class="pause-action-body">
          <span class="pause-action-label">צא ללא שמירה</span>
          <span class="pause-action-sub">ההתקדמות תאבד</span>
        </div>
      </button>

    </div>
  </div>
</div>

<div id="ov-resign-confirm" class="ov hidden" style="background:rgba(0,0,0,.82);">
  <div class="ovc" style="text-align:center;">
    <div style="font-size:32px;margin-bottom:6px;">!</div>
    <div class="ovt">לפרוש מהמשחק?</div>
    <div class="ovd" id="resign-confirm-msg">היריב יקבל ניצחון מיידי.</div>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:10px;">
      <button class="ovb s" id="resign-confirm-yes" style="padding:11px;font-size:13px;color:#ff8e8e;">פרוש</button>
      <button class="ovb p" id="resign-confirm-no" style="padding:11px;font-size:13px;" data-gm="המשך לשחק" data-gf="המשיכי לשחק">המשך לשחק</button>
    </div>
  </div>
</div>
