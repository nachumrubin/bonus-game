<!-- AVATAR STORE SCREEN — buy avatars with coins -->
<div id="savatar-store" class="screen hidden">
  <div class="store-room">
    <div class="store-head">
      <button id="store-back-btn" class="store-back" aria-label="חזרה">‹</button>
      <span class="store-title">חנות אווטארים</span>
      <span class="store-balance-chip"><span id="store-coin-balance">0</span> <img src="assets/rewards/gold coin.png" class="coin-ic" alt=""></span>
    </div>
    <div id="store-hint" class="store-hint"></div>
    <!-- Category sections (common / rare / epic / legendary) rendered by avatarStoreScreen.js -->
    <div id="store-grid" class="store-grid"></div>
  </div>
</div>
