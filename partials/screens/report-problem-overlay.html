<!-- REPORT A PROBLEM overlay (debug timeline) -->
<div id="ov-report" class="ov hidden">
  <div class="ovc" dir="rtl" style="text-align:center;max-width:380px;">
    <div class="ovic">🐞</div>
    <div class="ovt">דווח על בעיה במשחק</div>
    <div class="ovd">תאר/י מה קרה. נשמור תמונת מצב טכנית שתעזור לנו לבדוק — בלי צורך להסביר הכול.</div>
    <textarea id="report-message" class="report-textarea" rows="4"
              placeholder="לדוגמה: המילה נעלמה מהלוח / היריב לא רואה את המהלך שלי..."></textarea>
    <div id="report-status" class="report-status"></div>
    <div class="ovbtns">
      <button class="ovb s" id="report-cancel">ביטול</button>
      <button class="ovb p" id="report-send">שלח דיווח</button>
    </div>
  </div>
</div>
