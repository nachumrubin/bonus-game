# Semantic-ID whitelist for HSpell-derived paradigms.
#
# Each surface form HSpell emits carries a paradigm string in its native
# format (e.g. "ז,ע,יחיד,סמיכות" = masculine, noun, singular, construct).
# The function mapHspellToSemanticId() in 03d-inflect.js maps those native
# strings to the semantic IDs listed here. A surface form is kept only if
# its semantic ID has `include: true`.
#
# Default-deny: unrecognized paradigms get `unknown` and are excluded.
#
# Diagnostic: see `node tools/dictionary-build/diagnose-paradigms.mjs` for
# the actual HSpell paradigm vocabulary observed in the current build.

nouns:
  - id: n_masc_regular           # ז,ע,יחיד | ז,ע,רבים | ע,רבים,ז etc.
    include: true
  - id: n_fem_regular            # נ,ע,יחיד | נ,ע,רבים | ז,נ,ע,*
    include: true
  - id: n_construct_singular     # *,ע,יחיד,סמיכות
    include: true
  - id: n_construct_plural       # *,ע,רבים,סמיכות
    include: true
  - id: n_with_pronoun_suffix    # *,ע,*,של/X — 72.6% of HSpell output, EXCLUDED
    include: false
  - id: n_unknown                # safety: noun-tagged paradigm we didn't match
    include: false

adjectives:
  - id: adj_unbound              # ת,יחיד,ז | ת,רבים,נ etc.
    include: true
  - id: adj_construct            # ת,*,*,סמיכות
    include: true
  - id: adj_with_pronoun_suffix  # ת,*,של/X — EXCLUDED
    include: false

special:
  - id: proper_noun              # *,פרטי,*  — place names / personal names, EXCLUDED
    include: false
  - id: unknown                  # paradigm string we couldn't classify, EXCLUDED
    include: false

# Bump when the semantic-ID taxonomy changes. The build doesn't enforce this
# yet, but it'll be the lever for "rebuild forced because rules changed".
version: 2
